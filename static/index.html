<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sashiko</title>
    <style>
        body { font-family: monospace; max-width: 1200px; margin: 0 auto; padding: 20px; background-color: #f5f5f5; }
        h1 { border-bottom: 1px solid #ccc; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { text-align: left; padding: 8px; border-bottom: 1px solid #ddd; }
        tr:hover { background-color: #e0e0e0; }
        .status-Incomplete { color: gray; }
        .status-Pending { color: orange; }
        .status-Applied { color: green; }
        .status-Failed { color: red; }
        .copy-btn { cursor: pointer; border: 1px solid #ccc; background: #fff; padding: 2px 5px; border-radius: 3px; font-size: 12px; }
        .copy-btn:hover { background: #eee; }
    </style>
</head>
<body>
    <h1>Sashiko Patch Tracker</h1>
    <div id="stats">Loading stats...</div>

    <div style="margin-top: 15px; margin-bottom: 10px;">
        <button id="btn-patchsets" onclick="setMode('patchsets')" disabled>Patchsets</button>
        <button id="btn-messages" onclick="setMode('messages')">Messages</button>
    </div>

    <table id="patchsets">
        <thead id="table-head">
            <tr>
                <th>Subject</th>
                <th>Author</th>
                <th>Parts</th>
                <th>Date</th>
                <th>Status</th>
                <th></th>
            </tr>
        </thead>
        <tbody>
            <!-- Rows will be inserted here -->
        </tbody>
    </table>
    <div id="pagination" style="margin-top: 20px; text-align: center;">
        <button id="firstBtn" onclick="goToPage(1)" disabled>First</button>
        <button id="prevBtn" onclick="changePage(-1)" disabled>Previous</button>
        <span id="pageInfo" style="margin: 0 10px;">Page 1 of ?</span>
        <button id="nextBtn" onclick="changePage(1)">Next</button>
        <button id="lastBtn" onclick="goToLast()" disabled>Last</button>
    </div>

    <script>
        let currentPage = 1;
        const perPage = 50;
        let totalPages = 1;
        let currentMode = 'patchsets'; // 'patchsets' or 'messages'

        async function fetchStats() {
            const res = await fetch('/api/stats');
            const data = await res.json();
            document.getElementById('stats').innerHTML = `
                System Status: ${data.status} (v${data.version}) <br>
                Messages: ${data.messages} | Patchsets: ${data.patchsets}
            `;
        }

        function copyToClipboard(text) {
            navigator.clipboard.writeText(text).then(() => {
                console.log('Copied to clipboard:', text);
            });
        }

        function setMode(mode) {
            if (currentMode === mode) return;
            currentMode = mode;
            currentPage = 1;
            
            document.getElementById('btn-patchsets').disabled = (mode === 'patchsets');
            document.getElementById('btn-messages').disabled = (mode === 'messages');

            updateTableHeader();
            fetchData();
        }

        function updateTableHeader() {
            const thead = document.getElementById('table-head');
            if (currentMode === 'patchsets') {
                thead.innerHTML = `
                    <tr>
                        <th>Subject</th>
                        <th>Author</th>
                        <th>Parts</th>
                        <th>Date</th>
                        <th>Status</th>
                        <th></th>
                    </tr>
                `;
            } else {
                thead.innerHTML = `
                    <tr>
                        <th>Subject</th>
                        <th>Author</th>
                        <th>Date</th>
                        <th></th>
                    </tr>
                `;
            }
        }

        async function changePage(delta) {
            const newPage = currentPage + delta;
            if (newPage < 1 || newPage > totalPages) return;
            currentPage = newPage;
            await fetchData();
        }

        async function goToPage(page) {
            if (page < 1 || page > totalPages) return;
            currentPage = page;
            await fetchData();
        }

        async function goToLast() {
            currentPage = totalPages;
            await fetchData();
        }

        async function fetchData() {
            const endpoint = currentMode === 'patchsets' ? '/api/patchsets' : '/api/messages';
            const res = await fetch(`${endpoint}?page=${currentPage}&per_page=${perPage}`);
            const data = await res.json();
            
            const items = data.items || [];
            const total = data.total || 0;
            
            totalPages = Math.ceil(total / perPage);
            if (totalPages === 0) totalPages = 1;

            const tbody = document.querySelector('#patchsets tbody');
            tbody.innerHTML = '';
            
            document.getElementById('firstBtn').disabled = currentPage <= 1;
            document.getElementById('prevBtn').disabled = currentPage <= 1;
            document.getElementById('nextBtn').disabled = currentPage >= totalPages;
            document.getElementById('lastBtn').disabled = currentPage >= totalPages;
            document.getElementById('pageInfo').textContent = `Page ${currentPage} of ${totalPages} (${total} total)`;

            items.forEach(p => {
                const row = document.createElement('tr');
                const date = new Date(p.date * 1000).toISOString().split('T')[0];
                
                if (currentMode === 'patchsets') {
                    const parts = (p.received_parts === p.total_parts && p.total_parts > 0)
                        ? `${p.total_parts}`
                        : `${p.received_parts || 0}/${p.total_parts || 0}`;
                    
                    row.onclick = (e) => {
                        if (e.target.closest('.copy-btn')) return;
                        window.location.href = `/static/details.html?id=${encodeURIComponent(p.id)}`;
                    };
                    row.style.cursor = 'pointer';

                    row.innerHTML = `
                        <td>${p.subject || '(no subject)'}</td>
                        <td>${p.author || 'unknown'}</td>
                        <td>${parts}</td>
                        <td>${date}</td>
                        <td class="status-${p.status}">${p.status || 'Pending'}</td>
                        <td style="text-align: right;"><button class="copy-btn" onclick="copyToClipboard('${p.message_id || p.id}')">📋</button></td>
                    `;
                } else {
                    // Messages mode
                    row.onclick = (e) => {
                        if (e.target.closest('.copy-btn')) return;
                        window.location.href = `/static/message.html?id=${p.id}`;
                    };
                    row.style.cursor = 'pointer';

                    row.innerHTML = `
                        <td>${p.subject || '(no subject)'}</td>
                        <td>${p.author || 'unknown'}</td>
                        <td>${date}</td>
                        <td style="text-align: right;"><button class="copy-btn" onclick="copyToClipboard('${p.message_id}')">📋</button></td>
                    `;
                }
                tbody.appendChild(row);
            });
        }

        fetchStats();
        // Initial load
        fetchData();
    </script>
</body>
</html>

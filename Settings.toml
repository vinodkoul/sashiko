log_level = "info"

[database]
url = "sashiko.db"
token = ""

[mailing_lists]
track = ["linux-kernel"]

[nntp]
server = "nntp.lore.kernel.org"
port = 119

[ai]
provider = "gemini"
model = "gemini-3-pro-preview"
max_input_tokens = 900000
max_interactions = 100
temperature = 1.0

[ai.claude]
prompt_caching = true

[ai.gemini]
explicit_prompt_caching = true

[server]
host = "127.0.0.1"
port = 8080

[git]
repository_path = "third_party/linux"

[review]
concurrency = 24
worktree_dir = "review_trees"
timeout_seconds = 3600
max_retries = 3
# yamllint disable-file
apiVersion: v1
kind: ConfigMap
metadata:
  name: sashiko-maintenance-html
  namespace: sashiko
data:
  index.html: |
    <!DOCTYPE html>
    <html>
    <head>
        <title>Sashiko Maintenance</title>
        <style>
            body {
                font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
                background-color: #f7f9fc;
                color: #333;
                display: flex;
                justify-content: center;
                align-items: center;
                height: 100vh;
                margin: 0;
            }
            .container {
                text-align: center;
                padding: 2.5rem;
                background: white;
                border-radius: 12px;
                box-shadow: 0 10px 25px rgba(0,0,0,0.05);
                max-width: 450px;
            }
            .maintenance-img {
                width: 100%;
                max-width: 200px;
                height: auto;
                margin-bottom: 1.5rem;
                border-radius: 4px;
            }
            h1 { color: #1a73e8; margin-top: 0; font-size: 1.5rem; }
            small { color: #777; }
        </style>
    </head>
    <body>
        <div class="container">
            <!-- Embedded Tux Image -->
            <img src="data:image/png;base64," alt="Tux mending with Sashiko" class="maintenance-img">

            <h1>Sashiko is mending...</h1>
            <p>We're currently performing maintenance to keep our kernel analysis sharp. We'll be back online in just a moment.</p>

            <p><small>Thank you for your patience!</small></p>
        </div>
    </body>
    </html>
  default.conf: |
    server {
        listen 8080;
        server_name localhost;
        location / {
            root /usr/share/nginx/html;
            index index.html;
        }
    }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: sashiko-maintenance
  namespace: sashiko
spec:
  replicas: 1
  selector:
    matchLabels:
      app: sashiko-maintenance
  template:
    metadata:
      labels:
        app: sashiko-maintenance
    spec:
      containers:
      - name: nginx
        image: nginx:alpine
        ports:
        - containerPort: 8080
        volumeMounts:
        - name: html
          mountPath: /usr/share/nginx/html
        - name: config
          mountPath: /etc/nginx/conf.d/default.conf
          subPath: default.conf
      volumes:
      - name: html
        configMap:
          name: sashiko-maintenance-html
      - name: config
        configMap:
          name: sashiko-maintenance-html
---
apiVersion: v1
kind: Service
metadata:
  name: sashiko-maintenance-service
  namespace: sashiko
spec:
  type: NodePort
  selector:
    app: sashiko-maintenance
  ports:
  - protocol: TCP
    port: 8080
    targetPort: 8080
